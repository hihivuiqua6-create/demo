services:
  - type: web
    name: tma-platform
    runtime: node
    buildCommand: npm install && node src/setup.js
    startCommand: npm start
    envVars:
      - key: PORT
        value: 3000
      - key: HOST
        value: 0.0.0.0
      - key: BASE_URL
        sync: false
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: DB_PATH
        value: ./data/platform.db
      - key: UPLOAD_DIR
        value: ./uploads
