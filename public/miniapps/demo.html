<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demo Mini App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--tg-theme-bg-color, #ffffff);
      color: var(--tg-theme-text-color, #000000);
      min-height: 100vh;
    }
    .header {
      background: var(--tg-theme-secondary-bg-color, #f5f5f5);
      padding: 2rem 1rem 1.5rem;
      text-align: center;
    }
    .avatar { font-size: 4rem; margin-bottom: .5rem; }
    h1 { font-size: 1.5rem; }
    .subtitle { opacity: .6; font-size: .9rem; margin-top: .3rem; }
    .content { padding: 1.5rem; }
    .card {
      background: var(--tg-theme-secondary-bg-color, #f9f9f9);
      border-radius: 16px; padding: 1rem 1.5rem; margin-bottom: 1rem;
    }
    .btn {
      display: block; width: 100%; padding: 1rem;
      background: var(--tg-theme-button-color, #7c6aff);
      color: var(--tg-theme-button-text-color, #fff);
      border: none; border-radius: 14px; font-size: 1rem;
      font-weight: 600; cursor: pointer; margin-bottom: .7rem;
      transition: opacity .15s;
    }
    .btn:active { opacity: .8; }
    .btn-outline {
      background: transparent;
      border: 2px solid var(--tg-theme-button-color, #7c6aff);
      color: var(--tg-theme-button-color, #7c6aff);
    }
    .user-info { display: flex; align-items: center; gap: .8rem; }
    .user-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background: linear-gradient(135deg, #7c6aff, #00d4aa);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; color: #fff; font-weight: bold; flex-shrink: 0;
    }
    #counter { font-size: 2rem; font-weight: bold; text-align: center; padding: 1rem; }
  </style>
</head>
<body>
  <div class="header">
    <div class="avatar">🚀</div>
    <h1>Demo Mini App</h1>
    <p class="subtitle">Telegram Mini App mẫu</p>
  </div>

  <div class="content">
    <!-- User info -->
    <div class="card">
      <p style="font-size:.8rem;opacity:.6;margin-bottom:.5rem">THÔNG TIN</p>
      <div class="user-info" id="userInfo">
        <div class="user-avatar">?</div>
        <div>
          <div id="userName" style="font-weight:600">Đang tải...</div>
          <div id="userHandle" style="font-size:.85rem;opacity:.6"></div>
        </div>
      </div>
    </div>

    <!-- Counter demo -->
    <div class="card">
      <p style="font-size:.8rem;opacity:.6;margin-bottom:.5rem">COUNTER DEMO</p>
      <div id="counter">0</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem">
        <button class="btn" onclick="changeCount(-1)">−</button>
        <button class="btn" onclick="changeCount(1)">+</button>
      </div>
    </div>

    <!-- Actions -->
    <button class="btn" onclick="sendData()">📤 Gửi dữ liệu về Bot</button>
    <button class="btn btn-outline" onclick="Telegram.WebApp.close()">✕ Đóng</button>
  </div>

  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();

      // Load user info
      const user = tg.initDataUnsafe?.user;
      if (user) {
        document.getElementById('userName').textContent = `${user.first_name || ''} ${user.last_name || ''}`.trim();
        document.getElementById('userHandle').textContent = user.username ? `@${user.username}` : `ID: ${user.id}`;
        const avatar = document.querySelector('.user-avatar');
        avatar.textContent = (user.first_name || '?')[0].toUpperCase();
      }
    }

    let count = 0;
    function changeCount(delta) {
      count += delta;
      document.getElementById('counter').textContent = count;
    }

    function sendData() {
      const payload = JSON.stringify({ action: 'demo', count, timestamp: Date.now() });
      if (tg) {
        tg.sendData(payload);
      } else {
        alert('Data: ' + payload);
      }
    }
  </script>
</body>
</html>
