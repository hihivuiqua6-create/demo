<!doctype html>
<html lang="vi"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>TGBot · Đăng nhập</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a14;--surface:#12131f;--surface-2:#1a1c2c;--border:#262842;--text:#eef0ff;--muted:#8a8fb0;--brand:#7c5cff;--brand-2:#22d3ee;--danger:#ff5577}
*{box-sizing:border-box}html,body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,system-ui,sans-serif;min-height:100vh}
body{display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(1200px 600px at 20% -10%,#2a1a55 0%,transparent 60%),radial-gradient(900px 500px at 100% 100%,#0a4a55 0%,transparent 60%),var(--bg)}
.card{background:rgba(18,19,31,.75);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:18px;padding:36px;width:100%;max-width:420px;box-shadow:0 30px 80px rgba(0,0,0,.5)}
.logo{display:flex;align-items:center;gap:12px;margin-bottom:8px}.logo .b{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--brand),var(--brand-2));display:grid;place-items:center;font-weight:700;color:#fff}
h1{margin:18px 0 4px;font-size:24px}p.sub{color:var(--muted);margin:0 0 22px;font-size:14px}
.tabs{display:flex;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:4px;margin-bottom:18px}
.tabs button{flex:1;background:transparent;border:0;color:var(--muted);padding:8px;border-radius:8px;cursor:pointer;font-weight:600;font-size:13px}
.tabs button.active{background:var(--brand);color:#fff}
label{display:block;font-size:12px;color:var(--muted);margin:12px 0 6px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
input{width:100%;background:var(--surface-2);border:1px solid var(--border);color:var(--text);padding:12px 14px;border-radius:10px;font-size:14px;outline:none;transition:.15s}
input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(124,92,255,.2)}
button.primary{width:100%;margin-top:18px;padding:13px;border-radius:10px;border:0;background:linear-gradient(135deg,var(--brand),var(--brand-2));color:#fff;font-weight:700;cursor:pointer;font-size:14px}
button.primary:disabled{opacity:.6;cursor:not-allowed}
.err{color:var(--danger);font-size:13px;margin-top:12px;min-height:18px}
.hint{color:var(--muted);font-size:12px;margin-top:14px;text-align:center}
</style></head><body>
<div class="card">
  <div class="logo"><div class="b">T</div><div><div style="font-weight:700">TGBot · Auzastore</div><div style="color:var(--muted);font-size:12px">Multi-bot platform</div></div></div>
  <h1>Đăng nhập</h1><p class="sub">Truy cập bảng điều khiển bằng tài khoản admin hoặc seller.</p>
  <div class="tabs"><button id="tab-admin" class="active" onclick="setRole('admin')">Admin</button><button id="tab-seller" onclick="setRole('seller')">Seller</button></div>
  <form id="f" onsubmit="return doLogin(event)">
    <label>Tên đăng nhập</label><input id="u" autocomplete="username" required/>
    <label>Mật khẩu</label><input id="p" type="password" autocomplete="current-password" required/>
    <button class="primary" id="btn">Đăng nhập →</button>
    <div class="err" id="err"></div>
  </form>
  <p class="hint">Bị quên password? Đặt env <code>ADMIN_PASSWORD</code> trên server.</p>
</div>
<script>
let role='admin';
function setRole(r){role=r;document.getElementById('tab-admin').classList.toggle('active',r==='admin');document.getElementById('tab-seller').classList.toggle('active',r==='seller')}
async function doLogin(e){e.preventDefault();const btn=document.getElementById('btn');const err=document.getElementById('err');err.textContent='';btn.disabled=true;btn.textContent='Đang đăng nhập...';
  try{const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u.value,password:p.value,role})});
    const d=await r.json();if(!r.ok)throw new Error(d.error||'Lỗi');
    localStorage.setItem('tg_token',d.token);localStorage.setItem('tg_role',d.role);localStorage.setItem('tg_user',d.username);
    location.href=d.role==='admin'?'/admin':'/seller';
  }catch(ex){err.textContent=ex.message}finally{btn.disabled=false;btn.textContent='Đăng nhập →'}return false}
// auto-redirect if logged in
(async()=>{const t=localStorage.getItem('tg_token');if(!t)return;try{const r=await fetch('/api/me',{headers:{Authorization:'Bearer '+t}});if(r.ok){const d=await r.json();location.href=d.role==='admin'?'/admin':'/seller'}}catch{}})();
</script></body></html>
