
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AuzaStore Admin</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#1a1a1a,#2f1d47);
color:white;
}
.sidebar{
position:fixed;
left:0;
top:0;
width:230px;
height:100%;
background:#120f1f;
padding:20px;
box-shadow:0 0 20px rgba(0,0,0,.5);
}
.sidebar h1{
font-size:28px;
color:#ff9df6;
}
.sidebar a{
display:block;
padding:14px;
margin-top:12px;
background:#221733;
border-radius:12px;
text-decoration:none;
color:white;
transition:.3s;
}
.sidebar a:hover{
background:#b14cff;
}
.main{
margin-left:260px;
padding:30px;
}
.card{
background:#20172d;
padding:25px;
border-radius:20px;
margin-bottom:20px;
box-shadow:0 0 18px rgba(255,255,255,.06);
}
.stats{
display:flex;
gap:20px;
flex-wrap:wrap;
}
.box{
flex:1;
min-width:200px;
background:#2a1e3f;
padding:20px;
border-radius:18px;
font-size:22px;
}
input,button{
width:100%;
padding:15px;
margin-top:12px;
border:none;
border-radius:12px;
}
button{
background:#c45cff;
color:white;
font-weight:bold;
cursor:pointer;
}
</style>
</head>
<body>

<div class="sidebar">
<h1>🌸 AuzaStore</h1>
<a href="#">📊 Dashboard</a>
<a href="#">🛒 Quản lý Shop</a>
<a href="#">👤 Người dùng</a>
<a href="#">💳 Thanh toán</a>
<a href="#">⚙️ Cài đặt</a>
</div>

<div class="main">
<div class="card">
<h2>🚀 Hệ thống điều khiển</h2>
<p>Admin Panel nâng cấp full giao diện & bảo mật.</p>
</div>

<div class="stats">
<div class="box">👤 Users<br><b>12,521</b></div>
<div class="box">🛒 Orders<br><b>5,102</b></div>
<div class="box">💰 Revenue<br><b>128M</b></div>
</div>

<div class="card">
<h2>🔐 Bảo mật</h2>
<ul>
<li>Session Login</li>
<li>Password Hash</li>
<li>Anti Spam</li>
<li>Check Token</li>
<li>Admin Protection</li>
</ul>
</div>
</div>

</body>
</html>
